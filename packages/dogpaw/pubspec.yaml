name: dogpaw
description: Core Dog Paw Dart API and utilities for Flutter applications
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  ffi: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  test: ^1.24.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  dogpaw_test:
    path: ../dogpaw_test

flutter:
  plugin:
    platforms:
      linux:
        ffiPlugin: true
